<!-- ── Botón flotante ──────────────────────────────────────────── -->
<button class="ai-fab" (click)="toggleChat()" [class.ai-fab--open]="isOpen" *ngIf="weddingId"
        title="Asistente IA">
  <span class="ai-fab__icon" *ngIf="!isOpen">✨</span>
  <span class="ai-fab__icon" *ngIf="isOpen">✕</span>
  <span class="ai-fab__badge" *ngIf="!isOpen && usage && !usage.unlimited && (usage.remaining ?? 0) > 0">
    {{ usage.remaining }}
  </span>
</button>

<!-- ── Panel del chat ──────────────────────────────────────────── -->
<div class="ai-panel" [class.ai-panel--open]="isOpen" *ngIf="weddingId">

  <!-- Header -->
  <div class="ai-panel__header">
    <div class="ai-header__info">
      <span class="ai-header__avatar">✨</span>
      <div>
        <p class="ai-header__title">Asistente de Boda</p>
        <p class="ai-header__subtitle">Powered by GPT-4</p>
      </div>
    </div>
    <div class="ai-header__actions">
      <button class="ai-header__btn" (click)="clearChat()" title="Limpiar chat">
        <app-icon name="eliminar" [size]="14"></app-icon>
      </button>
      <button class="ai-header__btn" (click)="closeChat()" title="Cerrar">
        ✕
      </button>
    </div>
  </div>

  <!-- Barra de uso -->
  <div class="ai-usage-bar" *ngIf="usage && !usage.unlimited">
    <div class="ai-usage-bar__track">
      <div class="ai-usage-bar__fill"
           [style.width.%]="usagePct"
           [class.ai-usage-bar__fill--warning]="usagePct >= 70"
           [class.ai-usage-bar__fill--danger]="usagePct >= 90">
      </div>
    </div>
    <span class="ai-usage-bar__label">{{ usageText }}</span>
  </div>

  <!-- Banner límite alcanzado -->
  <div class="ai-limit-banner" *ngIf="limitReached">
    <p class="ai-limit-banner__text">
      ⚠️ Has alcanzado el límite de tu plan.
    </p>
    <a routerLink="/pricing" class="ai-limit-banner__btn" (click)="closeChat()">
      Ver planes →
    </a>
  </div>

  <!-- Mensajes -->
  <div class="ai-messages" #messagesContainer>

    <!-- Quick actions (solo si no hay mensajes del usuario) -->
    <div class="ai-quick-actions" *ngIf="messages.length <= 1 && !limitReached">
      <p class="ai-quick-actions__label">Sugerencias rápidas:</p>
      <button class="ai-quick-btn" (click)="quickAction('¿Qué tareas me faltan por completar?')">
        📋 Ver tareas pendientes
      </button>
      <button class="ai-quick-btn" (click)="quickAction('¿Cómo está el estado general de mi boda?')">
        📊 Resumen de mi boda
      </button>
      <button class="ai-quick-btn" (click)="quickAction('¿Qué debería hacer próximamente para organizar mi boda?')">
        🎯 ¿Qué hacer ahora?
      </button>
    </div>

    <!-- Burbuja de mensaje -->
    <div *ngFor="let msg of messages"
         class="ai-message"
         [class.ai-message--user]="msg.role === 'user'"
         [class.ai-message--assistant]="msg.role === 'assistant'">
      <span class="ai-message__avatar" *ngIf="msg.role === 'assistant'">✨</span>
      <div class="ai-message__bubble">
        <p class="ai-message__text" [innerHTML]="msg.content"></p>
      </div>
    </div>

    <!-- Typing indicator -->
    <div class="ai-message ai-message--assistant" *ngIf="isLoading">
      <span class="ai-message__avatar">✨</span>
      <div class="ai-message__bubble ai-message__bubble--typing">
        <span class="ai-typing-dot"></span>
        <span class="ai-typing-dot"></span>
        <span class="ai-typing-dot"></span>
      </div>
    </div>

  </div>

  <!-- Input -->
  <div class="ai-input-area" [class.ai-input-area--disabled]="limitReached">
    <textarea
      class="ai-input"
      [(ngModel)]="inputText"
      (keydown)="onKeydown($event)"
      [placeholder]="limitReached ? 'Límite alcanzado. Actualiza tu plan.' : 'Escribe tu pregunta...'"
      [disabled]="limitReached || isLoading"
      rows="1">
    </textarea>
    <button class="ai-send-btn"
            (click)="sendMessage()"
            [disabled]="!inputText.trim() || isLoading || limitReached">
      <app-icon name="send" [size]="18"></app-icon>
    </button>
  </div>

</div>
