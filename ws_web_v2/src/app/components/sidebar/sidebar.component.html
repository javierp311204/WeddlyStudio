<aside class="sidebar" [class.collapsed]="collapsed()">

  <!-- Fila superior: logo + botón toggle -->
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <img src="assets/logo/logo-icon.png" alt="Weddly" class="logo-img" />
      <span class="logo-text">{{ 'HOME.BRAND' | translate }}</span>
    </div>
    <button class="collapse-btn" (click)="toggle()"
            [title]="(collapsed() ? 'SIDEBAR.TOGGLE_EXPAND' : 'SIDEBAR.TOGGLE_COLLAPSE') | translate">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round">
        <path *ngIf="!collapsed()" d="M15 18l-6-6 6-6"/>
        <path *ngIf="collapsed()"  d="M9 18l6-6-6-6"/>
      </svg>
    </button>
  </div>

  <!-- Perfil -->
  <a class="sidebar-profile" routerLink="/profile" [title]="'SIDEBAR.PROFILE_TITLE' | translate">
    <div class="profile-avatar"
         [style.background-image]="avatarUrl ? 'url(' + avatarUrl + ')' : ''"
         [style.background-size]="'cover'"
         [style.background-position]="'center'">
      <span *ngIf="!avatarUrl">{{ getInitial() }}</span>
    </div>
    <div class="profile-info">
      <p class="profile-name">{{ authService.getUserNick() }}</p>
      <p class="profile-role">{{ getRoleLabel() }}</p>
    </div>
  </a>

  <!-- Mis Bodas -->
  <a class="nav-item mis-bodas-link"
     routerLink="/my-weddings"
     routerLinkActive="active"
     [title]="'SIDEBAR.MY_WEDDINGS' | translate">
    <span class="nav-icon">
      <app-icon name="anillo" [size]="18"></app-icon>
    </span>
    <span class="nav-label">{{ 'SIDEBAR.MY_WEDDINGS' | translate }}</span>
    <span class="active-bar"></span>
  </a>

  <div class="sidebar-divider"></div>

  <!-- Navegación principal -->
  <nav class="sidebar-nav">
    <ng-container *ngFor="let item of visibleNavItems">

      <!-- Item SIN hijos -->
      <a *ngIf="!item.children"
         [routerLink]="item.route"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
         class="nav-item"
         [title]="item.title | translate">
        <span class="nav-icon"><app-icon [name]="item.icon" [size]="18"></app-icon></span>
        <span class="nav-label">{{ item.label | translate }}</span>
        <span class="active-bar"></span>
      </a>

      <!-- Item CON hijos (acordeón / popover en móvil) -->
      <ng-container *ngIf="item.children">
        <button class="nav-item nav-item--parent"
                [class.open]="isOpen(item.route)"
                (click)="toggleMenu(item.route, $event)"
                [title]="item.title | translate"
                [attr.aria-expanded]="isOpen(item.route)">
          <span class="nav-icon"><app-icon [name]="item.icon" [size]="18"></app-icon></span>
          <span class="nav-label">{{ item.label | translate }}</span>
          <svg class="chevron" width="12" height="12" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M6 9l6 6 6-6"/>
          </svg>
        </button>
      </ng-container>

    </ng-container>
  </nav>

  <!-- Panel de submenú (desktop expandido: lateral fijo; desktop colapsado + móvil: popover) -->
  <div class="sidebar-submenu-panel"
       *ngIf="openMenuItem"
       [class.is-popover]="collapsed() || isMobile"
       [style.top.px]="(collapsed() || isMobile) ? submenuTop : null">
    <div class="submenu-header">{{ openMenuItem.label | translate }}</div>
    <div class="submenu-list">
      <a *ngFor="let child of openMenuItem.children"
         [routerLink]="child.route"
         routerLinkActive="active"
         class="nav-subitem"
         [title]="child.title | translate"
         (click)="closeMenu()">
        <span class="nav-subicon">
          <app-icon [name]="child.icon" [size]="16"></app-icon>
        </span>
        <span class="nav-sublabel">{{ child.label | translate }}</span>
      </a>
    </div>
  </div>

  <div class="sidebar-spacer"></div>
  <div class="sidebar-divider"></div>

  <!-- Footer -->
  <div class="sidebar-footer">
    <div class="footer-lang nav-item" title="Idioma">
      <span class="nav-icon lang-icon-trigger">
        <app-icon name="idiomas" [size]="18"></app-icon>
      </span>
      <app-language-selector class="lang-selector" />
    </div>

    <button class="nav-item logout-btn"
            (click)="authService.logout()"
            [title]="'NAV.LOGOUT' | translate">
      <span class="nav-icon"><app-icon name="cerrarSesion" [size]="18"></app-icon></span>
      <span class="nav-label">{{ 'NAV.LOGOUT' | translate }}</span>
    </button>
  </div>

</aside>

<!-- Overlay invisible para cerrar el submenu al tocar fuera (móvil) -->
<div *ngIf="openMenuItem && isMobile"
     style="position:fixed;inset:0;z-index:1059;"
     (click)="closeMenu()">
</div>
