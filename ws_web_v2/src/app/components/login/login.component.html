<div class="auth-wrapper min-vh-100 d-flex align-items-center justify-content-center p-4">
  <div class="auth-card bg-white rounded-4 shadow-sm position-relative">
    <button class="btn btn-link btn-back position-absolute text-decoration-none d-flex align-items-center gap-2" (click)="irAlHome()">
      <span class="icon">←</span> {{ 'COMMON.BACK' | translate }}
    </button>
    
    <div class="text-center mb-4 pt-3">
      <h2 class="display-5 fw-normal mb-2">{{ 'AUTH.LOGIN' | translate }}</h2>
      <p class="text-muted small mb-0">{{ 'AUTH.LOGIN_SUBTITLE' | translate }}</p>
    </div>

    <form>
      <div class="mb-3">
        <label class="form-label text-uppercase fw-semibold small ls-1 mb-1">{{ 'AUTH.EMAIL' | translate }}</label>
        <input
          type="email"
          class="form-control rounded-3"
          [(ngModel)]="email"
          name="email"
          placeholder="tu@email.com"
          (keyup.enter)="login()"
        />
      </div>

      <div class="mb-3">
        <label class="form-label text-uppercase fw-semibold small ls-1 mb-1">{{ 'AUTH.PASSWORD' | translate }}</label>
        <div class="position-relative">
          <input
            [type]="mostrarPassword ? 'text' : 'password'"
            class="form-control rounded-3 pe-5"
            [(ngModel)]="pass"
            name="pass"
            [placeholder]="'AUTH.PASSWORD_YOUR' | translate"
            (keyup.enter)="login()"
          />
          <button 
            type="button"
            class="btn btn-link position-absolute top-50 end-0 translate-middle-y text-decoration-none p-0 me-2"
            (click)="togglePassword()"
            style="z-index: 10;">
            <span class="eye-icon"><app-icon [name]="mostrarPassword ? 'eye' : 'eyeSlash'" [size]="16"></app-icon></span>
          </button>
        </div>
      </div>

      <div class="text-end mb-3">
        <a 
          class="forgot-password-link small text-decoration-none"
          (click)="irARecuperarPassword()"
          style="cursor: pointer;">
          {{ 'AUTH.FORGOT_PASSWORD' | translate }}
        </a>
      </div>

      <button 
        type="button"
        class="btn btn-auth w-100 rounded-3 py-2 fw-semibold" 
        (click)="login()">
        {{ 'AUTH.LOGIN' | translate }}
      </button>
    </form>

    <div class="auth-footer text-center mt-3 small text-muted">
      {{ 'AUTH.NO_ACCOUNT' | translate }} <a routerLink="/register" class="text-decoration-none fw-semibold">{{ 'AUTH.REGISTER' | translate }}</a>
    </div>
  </div>
</div>
