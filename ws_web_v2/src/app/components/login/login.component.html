<div class="login-layout">

  <!-- COLUMNA IZQUIERDA -->
  <div class="login-left">
    <div class="overlay"></div>
    <div class="left-content">
      <h1 class="brand-title">Weddly Studio</h1>
      <p class="brand-subtitle">{{ 'AUTH.REGISTER_LEFT_TEXT' | translate }}</p>
    </div>
  </div>

  <!-- COLUMNA DERECHA -->
  <div class="login-right">

    <button class="btn-back" (click)="irAlHome()">
      ← {{ 'COMMON.BACK' | translate }}
    </button>

    <div class="form-container">

      <h2 class="form-title">{{ 'AUTH.LOGIN' | translate }}</h2>
      <p class="form-subtitle">{{ 'AUTH.LOGIN_SUBTITLE' | translate }}</p>

      <!-- BOTONES SOCIALES -->
      <div class="social-grid">

        <button type="button" class="social-btn social-btn--google" (click)="loginConGoogle()">
          <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>

        <button type="button" class="social-btn social-btn--facebook" (click)="loginConFacebook()">
          <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#1877F2">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          Facebook
        </button>

      </div>

      <!-- SEPARADOR -->
      <div class="auth-divider">
        <span class="auth-divider__line"></span>
        <span class="auth-divider__text">EMAIL</span>
        <span class="auth-divider__line"></span>
      </div>

      <!-- FORMULARIO -->
      <form>

        <div class="mb-3">
          <label class="form-label">{{ 'AUTH.EMAIL' | translate }}</label>
          <input
            type="email"
            class="form-control"
            [(ngModel)]="email"
            name="email"
            placeholder="tu@email.com"
            (keyup.enter)="login()"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">{{ 'AUTH.PASSWORD' | translate }}</label>
          <div class="password-wrapper">
            <input
              [type]="mostrarPassword ? 'text' : 'password'"
              class="form-control"
              [(ngModel)]="pass"
              name="pass"
              [placeholder]="'AUTH.PASSWORD_YOUR' | translate"
              (keyup.enter)="login()"
            />
            <span class="eye-icon" (click)="togglePassword()">
              <app-icon [name]="mostrarPassword ? 'eye' : 'eyeSlash'" [size]="16"></app-icon>
            </span>
          </div>
        </div>

        <div class="forgot-row">
          <a class="forgot-link" (click)="irARecuperarPassword()">
            {{ 'AUTH.FORGOT_PASSWORD' | translate }}
          </a>
        </div>

        <button type="button" class="btn-auth w-100" (click)="login()">
          {{ 'AUTH.LOGIN' | translate }}
        </button>

      </form>

      <div class="auth-footer">
        {{ 'AUTH.NO_ACCOUNT' | translate }}
        <a routerLink="/register">{{ 'AUTH.REGISTER' | translate }}</a>
      </div>

    </div>
  </div>
</div>
