<div class="register-layout">
  
  <!-- COLUMNA IZQUIERDA: FOTO + TEXTO -->
  <div class="register-left">
    <div class="overlay"></div>
    <div class="left-content">
      <h1 class="brand-title">Weddly Studio</h1>
      <p class="brand-subtitle">
        {{ 'AUTH.REGISTER_LEFT_TEXT' | translate }}
      </p>
    </div>
  </div>

  <!-- COLUMNA DERECHA: FORMULARIO -->
  <div class="register-right">

    <button class="btn-back" routerLink="/home">
      ← {{ 'COMMON.BACK' | translate }}
    </button>

    <div class="form-container">

      <h2 class="form-title">{{ 'AUTH.REGISTER_TITLE' | translate }}</h2>
      <p class="form-subtitle">{{ 'AUTH.REGISTER_SUBTITLE' | translate }}</p>

      <form>

        <!-- NOMBRE + APELLIDO -->
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">{{ 'AUTH.FIRST_NAME' | translate }}</label>
            <input type="text" class="form-control"
                   [(ngModel)]="first_name" name="first_name"
                   placeholder="Ej: María" />
          </div>

          <div class="col-md-6">
            <label class="form-label">{{ 'AUTH.LAST_NAME' | translate }}</label>
            <input type="text" class="form-control"
                   [(ngModel)]="last_name" name="last_name"
                   placeholder="Ej: García" />
          </div>
        </div>

        <!-- NICKNAME -->
        <div class="mb-3">
          <label class="form-label">{{ 'AUTH.NICKNAME' | translate }}</label>
          <input type="text" class="form-control"
                 [(ngModel)]="nickname" name="nickname"
                 placeholder="Ej: Javi" />
        </div>

        <!-- EMAIL + PASSWORD -->
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">{{ 'AUTH.EMAIL' | translate }}</label>
            <input type="email" class="form-control"
                   [(ngModel)]="email" name="email"
                   placeholder="tu@email.com" />
          </div>

          <div class="col-md-6">
            <label class="form-label">{{ 'AUTH.PASSWORD' | translate }}</label>
            <div class="password-wrapper">
              <input [type]="mostrarPassword ? 'text' : 'password'"
                     class="form-control"
                     [(ngModel)]="pass" name="pass"
                     [placeholder]="'AUTH.PASSWORD_PLACEHOLDER' | translate" />
              <span class="eye-icon" (click)="togglePassword()">
               <app-icon [name]="mostrarPassword ? 'eye' : 'eyeSlash'" [size]="16"></app-icon>
              </span>
            </div>
          </div>
        </div>

        <!-- TELÉFONO -->
        <div class="mb-3">
          <label class="form-label">{{ 'AUTH.PHONE' | translate }}</label>
          <input type="tel" class="form-control"
                 [(ngModel)]="phone" name="phone"
                 placeholder="+34 600 000 000" />
        </div>

        <!-- GÉNERO -->
        <div class="mb-3">
          <label class="form-label">{{ 'AUTH.GENDER' | translate }}</label>
          <select class="form-select" [(ngModel)]="gender" name="gender">
            <option value="male">{{ 'AUTH.GENDER_MALE' | translate }}</option>
            <option value="female">{{ 'AUTH.GENDER_FEMALE' | translate }}</option>
            <option value="other">{{ 'AUTH.GENDER_OTHER' | translate }}</option>
            <option value="prefer_not">{{ 'AUTH.GENDER_PREFER_NOT' | translate }}</option>
          </select>
        </div>

        <!-- IDIOMA -->
        <div class="mb-3">
          <label class="form-label">{{ 'AUTH.LANGUAGE' | translate }}</label>
          <select class="form-select" [(ngModel)]="language" name="language">
            <option value="es">Español</option>
            <option value="ca">Català</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
          </select>
        </div>

        <!-- INFO INVITACIÓN -->
        <div class="mb-3" *ngIf="codigoBodaReferencia">
          <div class="alert alert-info small">
            📎 Llegarás a la boda con código <strong>{{ codigoBodaReferencia }}</strong>.
          </div>
        </div>

        <!-- BOTÓN -->
        <button type="button" class="btn-auth w-100"
                (click)="registrar()">
          {{ 'AUTH.REGISTER_TITLE' | translate }}
        </button>

      </form>

      <div class="auth-footer">
        {{ 'AUTH.ALREADY_HAVE_ACCOUNT' | translate }}
        <a routerLink="/login">{{ 'AUTH.LOGIN' | translate }}</a>
      </div>

    </div>
  </div>
</div>
