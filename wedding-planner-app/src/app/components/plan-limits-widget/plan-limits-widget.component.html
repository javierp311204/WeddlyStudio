<div *ngIf="mostrarWidget && !cargando" class="limits-widget position-fixed bottom-0 end-0 m-4 shadow-lg">
  <div class="widget-header d-flex justify-content-between align-items-center p-3">
    <div class="d-flex align-items-center gap-2">
      <span class="plan-badge" [style.background]="getPlanColor()">
        {{ getPlanNombre() }}
      </span>
    </div>
    <button class="btn-close-widget" (click)="cerrarWidget()">×</button>
  </div>

  <div class="widget-body p-3">
    <!-- Límite de Bodas -->
    <div class="limit-item mb-3" *ngIf="limites.maxBodas !== Infinity">
      <div class="d-flex justify-content-between mb-2">
        <span class="small fw-semibold">Bodas Activas</span>
        <span class="small text-muted">{{ uso.bodasActivas }} / {{ limites.maxBodas }}</span>
      </div>
      <div class="progress" style="height: 6px;">
        <div 
          class="progress-bar" 
          [class.bg-warning]="getPorcentajeBodas() >= 80"
          [class.bg-danger]="getPorcentajeBodas() >= 100"
          [style.width.%]="getPorcentajeBodas()">
        </div>
      </div>
    </div>

    <!-- Mensaje de advertencia -->
    <div class="alert alert-warning small py-2 px-3 mb-3" *ngIf="!uso.puedeCrearMasBodas">
      <strong>⚠️ Límite alcanzado</strong><br>
      Has alcanzado el límite de bodas de tu plan.
    </div>

    <!-- CTA Upgrade -->
    <button 
      class="btn btn-upgrade w-100 py-2 fw-semibold small"
      (click)="irAPricing()">
      <span *ngIf="planActual === 'free'">🚀 Actualizar Plan</span>
      <span *ngIf="planActual !== 'free'">✨ Ver Planes</span>
    </button>
  </div>
</div>
