<div class="auth-wrapper min-vh-100 d-flex align-items-center justify-content-center p-4">
  <div class="auth-card bg-white rounded-4 shadow-sm position-relative">
    <button class="btn btn-link btn-back position-absolute text-decoration-none d-flex align-items-center gap-2" routerLink="/home">
      <span class="icon">←</span> Regresar
    </button>
    
    <div class="text-center mb-4 pt-3">
      <h2 class="display-5 fw-normal mb-2">Crear Cuenta</h2>
      <p class="text-muted small mb-0">Únete a la mejor comunidad de organización de bodas</p>
    </div>

    <form>
      <div class="row g-3 mb-3">
        <div class="col-12">
          <label class="form-label text-uppercase fw-semibold small ls-1 mb-1">Soy...</label>
          <select class="form-select rounded-3" [(ngModel)]="rol" name="rol">
            <option value="admin">🤵 Novio/a (Crear Boda)</option>
            <option value="invitado">🥂 Invitado (Unirse)</option>
          </select>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label text-uppercase fw-semibold small ls-1 mb-1">Nick</label>
          <input
            type="text"
            class="form-control rounded-3"
            [(ngModel)]="nick"
            name="nick"
            placeholder="Ej: El Rey de la Pista"
            (keyup.enter)="registrar()"
          />
        </div>
        <div class="col-md-6">
          <label class="form-label text-uppercase fw-semibold small ls-1 mb-1">Email</label>
          <input
            type="email"
            class="form-control rounded-3"
            [(ngModel)]="email"
            name="email"
            placeholder="tu@email.com"
            (keyup.enter)="registrar()"
          />
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label text-uppercase fw-semibold small ls-1 mb-1">Contraseña</label>
          <div class="position-relative">
            <input
              [type]="mostrarPassword ? 'text' : 'password'"
              class="form-control rounded-3 pe-5"
              [(ngModel)]="pass"
              name="pass"
              placeholder="Mínimo 6 caracteres"
              (keyup.enter)="registrar()"
            />
            <button 
              type="button"
              class="btn btn-link position-absolute top-50 end-0 translate-middle-y text-decoration-none p-0 me-2"
              (click)="togglePassword()"
              style="z-index: 10;">
              <span class="eye-icon">{{ mostrarPassword ? '👁️' : '👁️‍🗨️' }}</span>
            </button>
          </div>
        </div>
        <div class="col-md-6">
          <label class="form-label text-uppercase fw-semibold small ls-1 mb-1">
            {{ rol === "admin" ? "Código de boda" : "Código invitación" }}
          </label>
          <input 
            type="text" 
            class="form-control rounded-3"
            [(ngModel)]="codigoBoda"
            name="codigoBoda"
            placeholder="Ej: BODA2025" 
            (keyup.enter)="registrar()"
          />
        </div>
      </div>

      <button 
        type="button"
        class="btn btn-auth w-100 rounded-3 py-2 fw-semibold mt-2" 
        (click)="registrar()">
        Crear Cuenta
      </button>
    </form>

    <div class="auth-footer text-center mt-3 small text-muted">
      ¿Ya tienes cuenta? <a routerLink="/login" class="text-decoration-none fw-semibold">Inicia sesión</a>
    </div>
  </div>
</div>
