<router-outlet></router-outlet>

<!-- Toast Notification -->
<div *ngIf="notifService.toastState$ | async as toast">
  <div
    class="toast-notification position-fixed shadow-lg rounded-4"
    [class.show]="toast.show"
    [class.error]="toast.type === 'error'"
  >
    <div class="toast-content d-flex align-items-start gap-3 position-relative">
      <span class="toast-icon fs-4">
        {{ toast.type === "success" ? "✅" : "❌" }}
      </span>
      <div class="text-wrapper flex-grow-1">
        <p class="toast-title fw-bold mb-1">{{ toast.title }}</p>
        <p class="toast-sub small mb-0">{{ toast.message }}</p>
      </div>
      <button class="toast-close position-absolute btn-close" (click)="notifService.hideToast()" aria-label="Close"></button>
    </div>
  </div>
</div>

<!-- Modal de Confirmación -->
<div
  class="modal-overlay position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center"
  *ngIf="notifService.confirmState$ | async as conf"
  [class.active]="conf.show"
>
  <div class="modal-card bg-white rounded-4 shadow text-center">
    <div class="modal-icon mb-3">⚠️</div>
    <h3 class="mb-3">{{ conf.title }}</h3>
    <p class="text-muted mb-4">{{ conf.message }}</p>

    <div class="dont-ask-container d-flex align-items-center justify-content-center gap-2 rounded-4 p-3 mb-4">
      <input type="checkbox" class="form-check-input" #dontAskCheck id="dontAskCheck" />
      <label class="form-check-label mb-0 small fw-medium" for="dontAskCheck">No volver a preguntar</label>
    </div>

    <div class="confirm-actions d-flex gap-3">
      <button
        class="btn btn-confirm-no flex-fill rounded-3 py-2 fw-semibold text-uppercase small"
        (click)="notifService.respondConfirmation(false, conf.key, false)"
      >
        Cancelar
      </button>
      <button
        class="btn btn-confirm-si flex-fill rounded-3 py-2 fw-semibold text-uppercase small"
        (click)="notifService.respondConfirmation(true, conf.key, dontAskCheck.checked)"
      >
        Sí, continuar
      </button>
    </div>
  </div>
</div>
